<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover' />
  <title>冒央会社 - 扫码付款</title>
  <meta name='description' content='购物车订单 · 扫码付款 · 支付完成后提交订单。' />
  <meta name='robots' content='noindex,follow' />
  <link rel='canonical' href='https://www.joinvip.vip/payment.html' />
  <link rel='icon' href='assets/img/logo.png' type='image/png' />
  <link rel='stylesheet' href='assets/style.css' />
</head>
<body>
  <div class='shell container'>
    <div class='topcard'>
      <header class='header checkoutHeader'>
        <a class='brand checkoutBack' href='order.html' aria-label='返回订单'>
          <svg viewBox='0 0 24 24' aria-hidden='true' class='backArrow'><path d='m15 18-6-6 6-6' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>
          <img src='assets/img/logo.png' alt='冒央会社' />
        </a>
        <div class='checkoutSecure'><svg viewBox='0 0 24 24' aria-hidden='true'><rect x='4' y='10' width='16' height='10' rx='2'/><path d='M8 10V7a4 4 0 0 1 8 0v3'/></svg><span data-secure-label>支付宝担保结算</span></div>
      </header>

      <main class='checkoutMain payMain'>
        <div class='checkoutStepper'>
          <div class='checkoutStep done'><b><svg viewBox='0 0 24 24' aria-hidden='true'><path d='m5 13 4 4L19 7' fill='none' stroke='currentColor' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/></svg></b><span>填写订单</span></div>
          <div class='checkoutStep active' data-step-pay><b>2</b><span>扫码付款</span></div>
          <div class='checkoutStep' data-step-submit><b>3</b><span>提交完成</span></div>
        </div>

        <div class='payCardTight' data-pay-block>
          <div class='payMethodHead'>
            <span class='payMethodTag' data-method-tag>支付宝</span>
            <a class='payMethodSwitch' href='order.html'>切换方式</a>
          </div>

          <div class='payAmountProminent'>
            <span>应付金额</span>
            <b data-amount-display>¥0</b>
            <small data-amount-note></small>
          </div>

          <div class='payTip' data-pay-tip></div>

          <div class='qrCompact'>
            <div class='qrFrame'>
              <img alt='收款码' data-pay-qr hidden>
              <span data-qr-empty>收款码加载中</span>
            </div>
            <div class='qrLabel' data-qr-label>支付宝扫一扫</div>
          </div>

          <div class='usdtAddrBox' data-usdt-box hidden>
            <div class='usdtAddrHead'>
              <span>TRON / TRC20 收款地址</span>
              <button type='button' class='usdtCopyBtn' data-copy-wallet>复制地址</button>
            </div>
            <code class='usdtAddrValue' data-usdt-address></code>
          </div>

          <details class='paySummaryFold'>
            <summary>订单详情 · <em data-summary-count>0</em> 件</summary>
            <div class='paySummaryList' data-summary-list></div>
            <div class='paySummaryTotals' data-summary-totals></div>
          </details>

          <button type='button' class='primaryBtn primaryBtnLg paySubmitBtn' data-finish-payment>付款完成，提交订单 <svg viewBox='0 0 24 24' aria-hidden='true'><path d='M5 12h14M13 6l6 6-6 6'/></svg></button>
          <div class='checkoutAlert' data-status hidden></div>
        </div>

        <div class='paySuccess' data-success hidden>
          <div class='paySuccessIcon'><svg viewBox='0 0 24 24' aria-hidden='true'><path d='m5 13 4 4L19 7'/></svg></div>
          <h2>订单已提交</h2>
          <p>客服将在 30 分钟内处理你的订单，订单确认邮件已发送至 <strong data-success-email></strong>，请保持邮箱与联系方式畅通。</p>

          <div class='paySuccessOrder'>
            <div class='paySuccessOrderHead'>
              <span>订单号</span>
              <code data-success-order></code>
            </div>
            <div class='paySuccessOrderItems' data-success-items></div>
            <div class='paySuccessOrderPaid'>
              <span>实付</span>
              <b data-success-paid></b>
            </div>
          </div>

          <div class='paySuccessActions'>
            <a href='/' class='primaryBtn primaryBtnLg'>返回首页</a>
            <a href='/#orderLookup' class='ghostBtn'>查询订单状态</a>
          </div>
        </div>

        <div class='emptyCart' data-empty hidden>
          <svg viewBox='0 0 24 24' aria-hidden='true'><path d='M5 7h14l-1.5 11h-11Z'/><path d='M9 7V5a3 3 0 0 1 6 0v2'/></svg>
          <h2>订单信息已失效</h2>
          <p>请返回购买页重新选购。</p>
          <a class='primaryBtn primaryBtnLg' href='services.html'>返回选购</a>
        </div>
      </main>

      <div class='footer'>Copyright © 2026 Maoyang Taiwan Inc. All rights reserved.</div>
    </div>
  </div>

  <button class='toTop' data-top aria-label='回到顶部'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M12 19V5' /><path d='M6 11l6-6 6 6' /></svg></button>

  <script src='assets/cart.js'></script>
  <script src='assets/payment-config.js'></script>
  <script src='assets/payment.js'></script>
</body>
</html>
