  <style>

  <style>
    .adminTools{display:grid;grid-template-columns:minmax(260px,1fr) auto;gap:12px;align-items:end;margin:0 0 14px}.adminSearch{display:grid;gap:5px;color:#344054;font-size:12px;font-weight:900}.adminSearch input{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;padding:11px 13px;font:inherit;font-size:16px;outline:none}.adminSearch input:focus{border-color:rgba(15,118,110,.5);box-shadow:0 0 0 3px rgba(15,118,110,.1)}.adminBulkBar{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}.adminSelectAll{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:9px 12px;color:#344054;font-size:12px;font-weight:900}.adminSelectedCount{color:#64748b;font-size:12px;font-weight:900;white-space:nowrap}.adminDanger{border:1px solid #fecaca;border-radius:999px;background:#fff1f2;color:#b91c1c;font-weight:950;padding:10px 16px;cursor:pointer;white-space:nowrap}.adminGhost:disabled,.adminDanger:disabled{opacity:.45;cursor:not-allowed}.adminSelectCell{width:36px}.adminSelectCell input{width:17px;height:17px;accent-color:var(--teal)}@media (max-width:720px){.adminTools{grid-template-columns:1fr;margin-bottom:12px}.adminSearch input,.adminPanel input,.adminPanel select,.adminPanel textarea{font-size:16px!important}.adminBulkBar{display:grid;grid-template-columns:1fr 1fr;gap:8px}.adminSelectAll{grid-column:1/-1;border-radius:10px;justify-content:center}.adminSelectedCount{grid-column:1/-1;text-align:center}.adminDanger,.adminGhost{border-radius:10px;min-height:40px}.ordersTable td[data-label='选择']{display:block;order:-3;padding:10px 11px;background:#f8fbfa}.ordersTable td[data-label='选择']:before{display:none}.adminSelectCell input{width:20px;height:20px}}

  <style>
    .adminMobileOrders{display:none}@media (max-width:720px){.tableWrap{display:none!important}.adminMobileOrders{display:grid;gap:8px}.adminMobileOrder{border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:0 6px 18px rgba(15,23,42,.05);padding:10px;display:grid;gap:8px}.adminMobileOrderTop{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:8px;align-items:start}.adminMobileSelect{width:20px;height:20px;margin-top:3px;accent-color:var(--teal)}.adminMobileMain{min-width:0;display:grid;gap:3px}.adminMobileTitle{color:var(--ink);font-size:13px;font-weight:950;line-height:1.3}.adminMobileCode{color:#64748b;font-size:11px;font-weight:850;line-height:1.35;word-break:break-all}.adminMobileMeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:#64748b;font-size:11px;font-weight:850}.adminMobilePay{color:var(--teal-dark);font-weight:950}.adminMobileInfo{display:grid;gap:4px;border-top:1px solid var(--line-soft);padding-top:8px;color:#334155;font-size:12px;line-height:1.45}.adminMobileInfo div{display:grid;grid-template-columns:58px minmax(0,1fr);gap:6px}.adminMobileInfo span{color:#94a3b8;font-size:11px;font-weight:950}.adminMobileInfo b{font-weight:850;word-break:break-word}.adminMobileRemark{border-top:1px solid var(--line-soft);padding-top:7px;color:#475569;font-size:12px;line-height:1.5;white-space:pre-wrap}.adminMobileEditor{border-top:1px solid var(--line);padding-top:8px}.adminMobileEditor .adminEditBox{box-shadow:none;padding:0;border:0}.adminMobileEditor .adminEditTop,.adminMobileEditor .adminFulfillGrid{grid-template-columns:1fr}.adminMobileEditor .adminEditActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.adminMobileEditor .adminCheck{grid-column:1/-1}.adminMobileOrder .adminAction{min-width:64px;min-height:34px;border-radius:9px;padding:7px 10px}}
  </style>
  <style>
    body.adminModalOpen{overflow:hidden}.adminModal[hidden]{display:none!important}.adminModal{position:fixed;inset:0;z-index:1000;display:grid;place-items:center;padding:16px;background:rgba(15,23,42,.34)}.adminModalBackdrop{position:absolute;inset:0}.adminModalPanel{position:relative;width:min(760px,100%);max-height:min(86svh,760px);display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden;border:1px solid rgba(15,118,110,.16);border-radius:14px;background:#fff;box-shadow:0 24px 80px rgba(15,23,42,.28)}.adminModalHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:#f8fbfa}.adminModalHead span{display:block;color:#0f766e;font-size:11px;font-weight:950}.adminModalHead strong{display:block;color:var(--ink);font-size:14px;line-height:1.35;word-break:break-all}.adminModalClose{width:34px;height:34px;border:1px solid var(--line);border-radius:10px;background:#fff;color:#334155;font-size:22px;line-height:1;cursor:pointer}.adminModalBody{min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:12px}.adminModal .adminEditBox{padding:0}.adminModal .adminEditBox input,.adminModal .adminEditBox select,.adminModal .adminEditBox textarea{font-size:16px!important;max-width:100%;box-sizing:border-box}.adminModal .adminEditActions{position:sticky;bottom:0;margin:0 -12px -12px;padding:10px 12px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(8px)}@media (max-width:720px){.adminModal{place-items:end center;min-height:100dvh;padding:10px max(10px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left))}.adminModalPanel{width:100%;max-height:calc(100dvh - 20px);border-radius:14px 14px 12px 12px}.adminModalHead{padding:10px 12px}.adminModalBody{padding:10px}.adminModal .adminEditTop,.adminModal .adminFulfillGrid{grid-template-columns:1fr}.adminModal .adminFulfillGrid{gap:8px}.adminModal .adminFulfillCard{padding:9px}.adminModal .adminEditActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 -10px -10px;padding:9px 10px}.adminModal .adminSave,.adminModal .adminGhost{width:100%;border-radius:10px}.adminModal .adminCheck{grid-column:1/-1;min-height:38px;padding:7px 9px;background:#f8fafc;border-radius:10px}}
  </style>
  <style>
    @media (max-width:720px){.adminMobileOrders{gap:5px}.adminMobileOrder{padding:7px;gap:5px;border-radius:9px;box-shadow:none}.adminMobileOrderTop{grid-template-columns:18px minmax(0,1fr) 56px;gap:6px}.adminMobileSelect{width:17px;height:17px;margin-top:2px}.adminMobileTitle{font-size:12px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.adminMobileCode{font-size:10px;line-height:1.2}.adminMobileMeta{gap:4px;font-size:10px}.adminStatusPill{padding:2px 6px;font-size:10px}.adminMobilePay{font-size:10.5px}.adminMobileInfo{padding-top:5px;gap:2px;font-size:10.5px;line-height:1.25}.adminMobileInfo div{grid-template-columns:34px minmax(0,1fr);gap:4px}.adminMobileInfo span{font-size:10px}.adminMobileInfo b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.adminMobileRemark{padding-top:5px;font-size:10.5px;line-height:1.35}.adminMobileOrder .adminAction{min-width:0;min-height:30px;padding:6px 8px;border-radius:8px;font-size:12px}}
  </style>
  <style>
    .adminTabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 0 14px;padding:4px;border:1px solid var(--line);border-radius:12px;background:#f8fbfa}.adminTabs button{border:0;border-radius:9px;background:transparent;color:#475569;font:inherit;font-size:13px;font-weight:950;min-height:38px;cursor:pointer}.adminTabs button.active{background:var(--teal);color:#fff}.adminSubPanel{display:grid;gap:12px}.adminSubHead{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:12px;background:#f8fbfa;padding:12px}.adminSubHead strong{display:block;color:var(--ink);font-size:16px}.adminSubHead span{display:block;color:#64748b;font-size:12px;font-weight:850}.adminAccountGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.adminAccountCard{display:grid;gap:9px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;box-shadow:0 6px 18px rgba(15,23,42,.045)}.adminAccountTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.adminAccountTop div{min-width:0}.adminAccountTop strong{display:block;color:var(--ink);font-size:13px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.adminAccountTop span{display:block;color:#64748b;font-size:11px;font-weight:850;margin-top:2px}.adminAccountTop b{color:var(--teal-dark);font-size:16px;white-space:nowrap}.adminAccountMeta{display:flex;gap:5px;flex-wrap:wrap}.adminAccountMeta span,.adminAccountNote{border-radius:999px;background:#f8fafc;color:#64748b;padding:3px 8px;font-size:10.5px;font-weight:850;overflow-wrap:anywhere}.adminAccountNote{border-radius:9px;line-height:1.45}.adminInlineForm,.adminCodeForm{display:grid;gap:7px}.adminInlineForm{grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto}.adminInlineForm input,.adminCodeForm input,.adminCodeForm select{width:100%;border:1px solid var(--line);border-radius:9px;background:#fff;padding:9px 10px;font:inherit;font-size:14px}.adminCodeForm{grid-template-columns:repeat(4,minmax(0,1fr));border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px}.adminCodeForm .adminSave{grid-column:span 1}.adminCardActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:720px){.adminTabs{gap:4px;margin-bottom:10px}.adminTabs button{min-height:34px;font-size:11.5px}.adminSubHead{padding:9px;border-radius:10px}.adminAccountGrid{grid-template-columns:1fr;gap:7px}.adminAccountCard{padding:9px;border-radius:10px;gap:7px;box-shadow:none}.adminInlineForm,.adminCodeForm{grid-template-columns:1fr}.adminCodeForm{padding:9px}.adminInlineForm input,.adminCodeForm input,.adminCodeForm select{font-size:16px}.adminInlineForm .adminSave,.adminCodeForm .adminSave{width:100%;border-radius:10px}.adminAccountTop strong{font-size:12.5px}.adminAccountTop b{font-size:14px}}

<body>
  <main class='adminShell'>
    <div class='adminTop'>
      <img src='assets/img/logo.png' alt='冒央会社'>
      <a href='/'>返回网站</a>
    </div>
    <section class='adminPanel'>
      <h1>订单后台</h1>
      <form class='adminForm' data-admin-form>
        <input type='password' data-admin-key placeholder='管理密钥' autocomplete='current-password' required>
        <button type='submit'>读取订单</button>
      </form>
      <div class='adminTools'>
        <label class='adminSearch'>
          <span>搜索订单</span>
          <input type='search' data-admin-search placeholder='输入订单号或邮箱' autocomplete='off' inputmode='search'>
        </label>
        <div class='adminBulkBar'>
          <label class='adminSelectAll'><input type='checkbox' data-select-all> 全选当前结果</label>
          <span class='adminSelectedCount' data-selected-count>已选 0 单</span>
          <button type='button' class='adminGhost' data-bulk-cancel disabled>批量取消</button>
          <button type='button' class='adminDanger' data-bulk-delete disabled>批量删除</button>
        </div>
      </div>
      <div class='adminStatus' data-admin-status hidden></div>
      <div class='emptyState' data-empty-state>暂无订单</div>
      <div class='adminMobileOrders' data-mobile-orders></div>
      <div class='tableWrap'>
        <table class='ordersTable'>
          <thead>
            <tr><th>选择</th><th>状态</th><th>操作</th><th>时间</th><th>订单号</th><th>服务</th><th>支付</th><th>应付</th><th>交付信息</th><th>邮箱</th><th>联系方式</th><th>备注</th></tr>
          </thead>
          <tbody data-order-rows></tbody>
        </table>
      </div>
    </section>
  </main>
  <div class='adminModal' data-admin-modal hidden>
    <div class='adminModalBackdrop' data-admin-modal-close></div>
    <section class='adminModalPanel' role='dialog' aria-modal='true' aria-labelledby='adminModalTitle'>
      <div class='adminModalHead'>
        <div><span>处理订单</span><strong id='adminModalTitle' data-admin-modal-title></strong></div>
        <button type='button' class='adminModalClose' data-admin-modal-close aria-label='关闭弹窗'>×</button>
      </div>
      <div class='adminModalBody' data-admin-modal-body></div>
    </section>
  </div>
  <script src='assets/admin.js'></script>
  <script src='assets/admin-users.js'></script>
</body>
</html>
