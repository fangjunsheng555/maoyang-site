<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width,initial-scale=1' />
  <title>冒央会社 - 订单后台</title>
  <meta name='robots' content='noindex,nofollow' />
  <link rel='icon' href='assets/img/logo.png' type='image/png' />
  <link rel='stylesheet' href='assets/style.css' />
  <style>
    body{background:#f4f7f6}.adminShell{max-width:1240px;margin:0 auto;padding:24px 14px 44px}.adminTop{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.adminTop img{height:42px;width:auto}.adminTop a{color:var(--teal-dark);font-weight:950;text-decoration:none}.adminPanel{border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow-sm);padding:18px}.adminPanel h1{margin:0 0 14px;color:var(--ink-soft);font-size:24px;line-height:1.2}.adminForm{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;margin-bottom:14px}.adminForm input{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px 14px;font:inherit}.adminForm button,.adminAction,.adminSave{border:0;border-radius:999px;background:var(--teal);color:#fff;font-weight:950;padding:10px 16px;cursor:pointer;white-space:nowrap}.adminAction{font-size:12px;padding:8px 13px}.adminSave{min-height:42px}.adminGhost{border:1px solid var(--line);border-radius:999px;background:#fff;color:#344054;font-weight:900;padding:10px 16px;cursor:pointer}.adminStatus{margin:0 0 14px;border-radius:8px;background:#ecfdf3;color:#065f46;padding:11px 13px;font-weight:850}.adminStatus.warn{background:#fff7ed;color:#9a3412}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:8px}.ordersTable{width:100%;border-collapse:collapse;min-width:1120px}.ordersTable th,.ordersTable td{border-bottom:1px solid var(--line);padding:10px 12px;text-align:left;vertical-align:top;font-size:12.5px}.ordersTable th{background:#f8fbfa;color:#344054;font-weight:950}.ordersTable td{color:#1f2937;max-width:210px;word-break:break-word}.adminStatusPill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:950;background:#fff7ed;color:#9a3412}.adminStatusPill.completed{background:#ecfdf3;color:#047857}.adminStatusPill.cancelled{background:#f1f5f9;color:#475569}.adminEditRow td{background:#fbfdfc}.adminEditBox{display:grid;gap:12px;padding:4px}.adminEditTop{display:grid;grid-template-columns:180px 1fr 1fr;gap:10px}.adminEditBox label{display:grid;gap:4px;color:#344054;font-size:12px;font-weight:900}.adminEditBox input,.adminEditBox select,.adminEditBox textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;padding:10px 11px;font:inherit;font-size:13px}.adminFulfillGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.adminFulfillCard{border:1px solid var(--line-soft);border-radius:10px;background:#fff;padding:11px;display:grid;gap:8px}.adminFulfillCard strong{font-size:13px;color:var(--ink)}.adminReadonly{border-radius:8px;background:#f8fafc;border:1px solid var(--line-soft);padding:9px 10px;color:#64748b;font-size:12px;line-height:1.6}.adminEditActions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.adminCheck{display:inline-flex!important;grid-template-columns:auto 1fr!important;align-items:center;gap:7px}.adminCheck input{width:auto}.emptyState{border:1px dashed #cfd8d5;border-radius:8px;padding:26px;text-align:center;color:var(--muted);font-weight:850}@media (max-width:720px){.adminShell{padding:14px 10px 36px}.adminTop{align-items:flex-start;flex-direction:column;margin-bottom:12px}.adminForm{grid-template-columns:1fr}.adminForm button{width:100%;border-radius:10px}.adminPanel{padding:13px;border-radius:12px;box-shadow:none}.adminPanel h1{font-size:21px}.adminStatus{font-size:12.5px;line-height:1.55}.tableWrap{overflow:visible;border:0;border-radius:0}.ordersTable{display:block;min-width:0;width:100%;border-collapse:separate}.ordersTable thead{display:none}.ordersTable tbody{display:grid;gap:10px}.ordersTable tr{display:grid;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 8px 22px rgba(15,23,42,.06);overflow:hidden}.ordersTable td{display:grid;grid-template-columns:70px minmax(0,1fr);gap:8px;align-items:start;max-width:none;padding:8px 11px;border-bottom:1px solid var(--line-soft);font-size:12.5px;line-height:1.55}.ordersTable td:before{content:attr(data-label);color:#94a3b8;font-size:11px;font-weight:950;white-space:nowrap}.ordersTable td[data-label='状态']{order:-2}.ordersTable td[data-label='操作']{display:block;order:-1;padding:10px 11px;background:#f8fbfa}.ordersTable td[data-label='操作']:before{display:none}.ordersTable td[data-label='备注']:empty{display:none}.ordersTable td:last-child{border-bottom:0}.adminAction{width:100%;min-height:42px;border-radius:10px;font-size:13px}.adminEditRow{border:0!important;box-shadow:none!important;background:transparent!important;overflow:visible!important}.adminEditRow td{display:block;padding:0;border:0;background:transparent}.adminEditRow td:before{display:none}.adminEditBox{padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 8px 22px rgba(15,23,42,.06)}.adminEditTop,.adminFulfillGrid{grid-template-columns:1fr}.adminEditActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.adminSave,.adminGhost{width:100%;border-radius:10px}.adminCheck{grid-column:1/-1;justify-content:flex-start;background:#f8fafc;border-radius:10px;padding:8px 10px}}
  </style>
</head>
<body>
  <main class='adminShell'>
    <div class='adminTop'>
      <img src='assets/img/logo.png' alt='冒央会社'>
      <a href='/'>返回网站</a>
    </div>
    <section class='adminPanel'>
      <h1>订单后台</h1>
      <form class='adminForm' data-admin-form>
        <input type='password' data-admin-key placeholder='管理密钥' autocomplete='current-password' required>
        <button type='submit'>读取订单</button>
      </form>
      <div class='adminStatus' data-admin-status hidden></div>
      <div class='emptyState' data-empty-state>暂无订单</div>
      <div class='tableWrap'>
        <table class='ordersTable'>
          <thead>
            <tr><th>状态</th><th>操作</th><th>时间</th><th>订单号</th><th>服务</th><th>支付</th><th>应付</th><th>交付信息</th><th>邮箱</th><th>联系方式</th><th>备注</th></tr>
          </thead>
          <tbody data-order-rows></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src='assets/admin.js'></script>
</body>
</html>
