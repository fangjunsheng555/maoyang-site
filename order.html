<!doctype html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover' />
  <title>冒央会社 - 订单结算</title>
  <meta name='description' content='购物车结算 · 多件组合 9.5 折起 · 邮箱接收订单确认与日后查询。' />
  <meta name='robots' content='index,follow,max-image-preview:large,max-snippet:-1' />
  <link rel='canonical' href='https://www.joinvip.vip/order.html' />
  <link rel='icon' href='assets/img/logo.png' type='image/png' />
  <link rel='stylesheet' href='assets/style.css' />
</head>
<body>
  <div class='shell container'>
    <div class='topcard'>
      <header class='header checkoutHeader'>
        <a class='brand checkoutBack' href='services.html' aria-label='返回购买'>
          <svg viewBox='0 0 24 24' aria-hidden='true' class='backArrow'><path d='m15 18-6-6 6-6' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>
          <img src='assets/img/logo.png' alt='冒央会社' />
        </a>
        <div class='checkoutSecure'><svg viewBox='0 0 24 24' aria-hidden='true'><rect x='4' y='10' width='16' height='10' rx='2'/><path d='M8 10V7a4 4 0 0 1 8 0v3'/></svg>担保支付 · 安全结算</div>
      </header>

      <main class='checkoutMain'>
        <div class='checkoutStepper'>
          <div class='checkoutStep done'><b>1</b><span>填写订单</span></div>
          <div class='checkoutStep active'><b>2</b><span>扫码付款</span></div>
          <div class='checkoutStep'><b>3</b><span>提交完成</span></div>
        </div>

        <div class='checkoutAlert' data-status hidden></div>

        <div class='emptyCart' data-empty-cart hidden>
          <svg viewBox='0 0 24 24' aria-hidden='true'><path d='M5 7h14l-1.5 11h-11Z'/><path d='M9 7V5a3 3 0 0 1 6 0v2'/></svg>
          <h2>购物车为空</h2>
          <p>还没有选购商品，先去看看吧。</p>
          <a class='primaryBtn primaryBtnLg' href='services.html'>返回选购</a>
        </div>

        <form class='checkoutGrid' data-checkout-form hidden>
          <div class='checkoutLeft'>
            <div class='checkoutTrust'>
              <span><svg viewBox='0 0 24 24' aria-hidden='true'><rect x='4' y='10' width='16' height='10' rx='2'/><path d='M8 10V7a4 4 0 0 1 8 0v3'/></svg>信息加密</span>
              <span><svg viewBox='0 0 24 24' aria-hidden='true'><path d='M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5Z'/></svg>担保支付</span>
              <span><svg viewBox='0 0 24 24' aria-hidden='true'><path d='M13 2 4 13h7l-1 9 9-11h-7Z'/></svg>30 分钟开通</span>
              <span><svg viewBox='0 0 24 24' aria-hidden='true'><path d='M21 12a9 9 0 1 1-3-6.7L21 8'/><path d='M21 4v4h-4'/></svg>7 天可退</span>
            </div>

            <section class='checkoutCard'>
              <div class='checkoutCardHead'><h3>已选商品 <em data-cart-count>0</em></h3><a class='textLink' href='services.html'>+ 继续选购</a></div>
              <div class='checkoutItems' data-cart-items></div>
            </section>

            <section class='checkoutCard' data-product-fields-section hidden>
              <div class='checkoutCardHead'><h3>商品配置</h3></div>
              <div class='productFields' data-product-fields></div>
            </section>

            <section class='checkoutCard'>
              <div class='checkoutCardHead'><h3>联系信息</h3></div>
              <label class='field'>
                <span>邮箱 <em class='req'>*</em></span>
                <input type='email' name='email' inputmode='email' autocomplete='email' placeholder='例如 you@example.com' required>
                <small class='fieldNote'>用于接收订单确认信息与日后订单查询</small>
              </label>
              <label class='field'>
                <span>联系方式 <em class='req'>*</em></span>
                <input name='contact' autocomplete='tel' placeholder='QQ / 微信 / WhatsApp / Telegram' required>
                <small class='fieldNote'>必要时工作人员将通过此联系方式联系你</small>
              </label>
              <label class='field'>
                <span>备注 <em class='opt'>非必填</em></span>
                <textarea name='remark' rows='2' placeholder='地区 / 时长 / 特殊需求等'></textarea>
              </label>
            </section>
          </div>

          <aside class='checkoutRight'>
            <section class='checkoutCard summarySticky'>
              <div class='checkoutCardHead'><h3>订单总览</h3></div>
              <div class='cartSummary' data-cart-summary></div>

              <div class='paymentMethodGroup'>
                <div class='paymentMethodLabel'>选择支付方式</div>
                <div class='paymentMethodOptions'>
                  <label class='paymentMethodOption'>
                    <input type='radio' name='paymentMethod' value='alipay' checked>
                    <div class='paymentIcon alipayIcon'>支付宝</div>
                    <div class='paymentDetail'>
                      <strong data-pay-cny>¥0</strong>
                      <small>担保支付 · 即时到账</small>
                    </div>
                  </label>
                  <label class='paymentMethodOption'>
                    <input type='radio' name='paymentMethod' value='usdt'>
                    <div class='paymentIcon usdtIcon'>USDT</div>
                    <div class='paymentDetail'>
                      <strong data-pay-usdt>0 USDT</strong>
                      <small>9 折优惠 · TRC20</small>
                    </div>
                    <div class='paymentBadge'>9 折</div>
                  </label>
                </div>
              </div>

              <button type='submit' class='primaryBtn primaryBtnLg checkoutSubmit' data-checkout-submit>前往支付 <svg viewBox='0 0 24 24' aria-hidden='true'><path d='M5 12h14M13 6l6 6-6 6'/></svg></button>

              <div class='secureRow'>
                <svg viewBox='0 0 24 24' aria-hidden='true'><rect x='4' y='10' width='16' height='10' rx='2'/><path d='M8 10V7a4 4 0 0 1 8 0v3'/></svg>
                <span>全程加密 · 担保支付 · 30 分钟内开通</span>
              </div>
            </section>
          </aside>

          <div class='checkoutMobileCta' data-mobile-cta>
            <div class='checkoutMobileCtaInfo'>
              <small data-mobile-method>支付宝</small>
              <b data-mobile-amount>¥0</b>
            </div>
            <button type='submit' class='primaryBtn checkoutMobileCtaBtn'>前往支付 <svg viewBox='0 0 24 24' aria-hidden='true'><path d='M5 12h14M13 6l6 6-6 6'/></svg></button>
          </div>
        </form>
      </main>

      <div class='footer'>Copyright © 2026 Maoyang Taiwan Inc. All rights reserved.</div>
    </div>
  </div>

  <button class='toTop' data-top aria-label='回到顶部'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M12 19V5' /><path d='M6 11l6-6 6 6' /></svg></button>

  <script src='assets/cart.js'></script>
  <script src='assets/payment-config.js'></script>
  <script src='assets/order.js'></script>
</body>
</html>
